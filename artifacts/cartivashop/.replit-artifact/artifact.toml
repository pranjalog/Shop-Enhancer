kind = "web"
previewPath = "/"
title = "CartivaSho"
version = "1.0.0"
id = "artifacts/cartivashop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20066

[services.development]
run = "pnpm --filter @workspace/cartivashop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cartivashop", "run", "build" ]
publicDir = "artifacts/cartivashop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20066"
BASE_PATH = "/"
